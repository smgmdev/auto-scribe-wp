    <!-- Shadow mode: isolate localStorage so iframe sessions don't overwrite parent -->
    <script>
      (function() {
        try {
          if (new URLSearchParams(window.location.search).get('shadow') !== '1') return;
          var mem = {};
          var origSet = localStorage.setItem.bind(localStorage);
          var origGet = localStorage.getItem.bind(localStorage);
          var origRem = localStorage.removeItem.bind(localStorage);
          localStorage.setItem = function(k, v) {
            if (k.indexOf('sb-') === 0) { mem[k] = v; return; }
            origSet(k, v);
          };
          localStorage.getItem = function(k) {
            if (k.indexOf('sb-') === 0) return mem[k] || null;
            return origGet(k);
          };
          localStorage.removeItem = function(k) {
            if (k.indexOf('sb-') === 0) { delete mem[k]; return; }
            origRem(k);
          };
          // Block BroadcastChannel so Supabase auth changes in the iframe
          // don't propagate to the parent window and hijack the admin session
          window.BroadcastChannel = function(name) {
            this.name = name;
            this.postMessage = function() {};
            this.close = function() {};
            this.onmessage = null;
            this.onmessageerror = null;
            this.addEventListener = function() {};
            this.removeEventListener = function() {};
            this.dispatchEvent = function() { return true; };
          };

          // Stub navigator.locks so the iframe's Supabase client doesn't
          // compete with the parent window for token-refresh locks.
          if (navigator.locks) {
            navigator.locks.request = function(_name, optionsOrCb, cb) {
              var fn = typeof optionsOrCb === 'function' ? optionsOrCb : cb;
              if (typeof fn === 'function') {
                return Promise.resolve(fn({ name: _name, mode: 'exclusive' }));
              }
              return Promise.resolve();
            };
          }

          // Suppress storage events so the parent window's Supabase client
          // doesn't react to any writes that leak past the localStorage patch
          window.addEventListener('storage', function(e) { e.stopImmediatePropagation(); }, true);

          // Block auto-refresh token requests from the shadow iframe.
          // Allow the FIRST /auth/v1/token request (needed by setSession())
          // but block all subsequent ones (auto-refresh) to prevent server-side
          // token revocation that kills the admin's session.
          var origFetch = window.fetch;
          var tokenRequestCount = 0;
          window.fetch = function(input, init) {
            var url = '';
            if (typeof input === 'string') { url = input; }
            else if (input instanceof Request) { url = input.url; }
            else if (input && input.url) { url = input.url; }
            // Token endpoint: allow first call (setSession), block the rest
            if (url.indexOf('/auth/v1/token') !== -1) {
              tokenRequestCount++;
              if (tokenRequestCount > 1) {
                return Promise.resolve(new Response(JSON.stringify({ error: 'blocked_in_shadow' }), {
                  status: 400,
                  headers: { 'Content-Type': 'application/json' }
                }));
              }
              // Allow the first request through (setSession needs it)
            }
            // Block session logout to prevent revoking shared tokens
            if (url.indexOf('/auth/v1/logout') !== -1) {
              return Promise.resolve(new Response(null, { status: 204 }));
            }
            return origFetch.apply(this, arguments);
          };
        } catch(e) {}
      })();
    </script>
